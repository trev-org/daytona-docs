components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: API Key access
    oauth2:
      type: openIdConnect
      openIdConnectUrl: http://localhost:3000/.well-known/openid-configuration
  schemas:
    Announcement:
      type: object
      properties:
        text:
          type: string
          description: The announcement text
          example: New feature available!
        learnMoreUrl:
          type: string
          description: URL to learn more about the announcement
          example: https://example.com/learn-more
      required:
        - text
    PosthogConfig:
      type: object
      properties:
        apiKey:
          type: string
          description: PostHog API key
          example: phc_abc123
        host:
          type: string
          description: PostHog host URL
          example: https://app.posthog.com
      required:
        - apiKey
        - host
    OidcConfig:
      type: object
      properties:
        issuer:
          type: string
          description: OIDC issuer
          example: https://auth.example.com
        clientId:
          type: string
          description: OIDC client ID
          example: daytona-client
        audience:
          type: string
          description: OIDC audience
          example: daytona-api
      required:
        - issuer
        - clientId
        - audience
    RateLimitEntry:
      type: object
      properties:
        ttl:
          type: number
          description: Rate limit TTL in seconds
          example: 60
        limit:
          type: number
          description: Rate limit max requests
          example: 100
    RateLimitConfig:
      type: object
      properties:
        failedAuth:
          description: Failed authentication rate limit
          allOf:
            - $ref: "#/components/schemas/RateLimitEntry"
        authenticated:
          description: Authenticated rate limit
          allOf:
            - $ref: "#/components/schemas/RateLimitEntry"
        sandboxCreate:
          description: Sandbox create rate limit
          allOf:
            - $ref: "#/components/schemas/RateLimitEntry"
        sandboxLifecycle:
          description: Sandbox lifecycle rate limit
          allOf:
            - $ref: "#/components/schemas/RateLimitEntry"
    DaytonaConfiguration:
      type: object
      properties:
        version:
          type: string
          description: Daytona version
          example: 0.0.1
        posthog:
          description: PostHog configuration
          allOf:
            - $ref: "#/components/schemas/PosthogConfig"
        oidc:
          description: OIDC configuration
          allOf:
            - $ref: "#/components/schemas/OidcConfig"
        linkedAccountsEnabled:
          type: boolean
          description: Whether linked accounts are enabled
          example: true
        announcements:
          type: object
          description: System announcements
          additionalProperties:
            $ref: "#/components/schemas/Announcement"
          example:
            feature-update:
              text: New feature available!
              learnMoreUrl: https://example.com
        pylonAppId:
          type: string
          description: Pylon application ID
          example: pylon-app-123
        proxyTemplateUrl:
          type: string
          description: Proxy template URL
          example: https://{{PORT}}-{{sandboxId}}.proxy.example.com
        proxyToolboxUrl:
          type: string
          description: Toolbox template URL
          example: https://proxy.example.com/toolbox
        defaultSnapshot:
          type: string
          description: Default snapshot for sandboxes
          example: ubuntu:22.04
        dashboardUrl:
          type: string
          description: Dashboard URL
          example: https://dashboard.example.com
        maxAutoArchiveInterval:
          type: number
          description: Maximum auto-archive interval in minutes
          example: 43200
        maintananceMode:
          type: boolean
          description: Whether maintenance mode is enabled
          example: false
        environment:
          type: string
          description: Current environment
          example: production
        billingApiUrl:
          type: string
          description: Billing API URL
          example: https://billing.example.com
        sshGatewayCommand:
          type: string
          description: SSH Gateway command
          example: ssh -p 2222 {{TOKEN}}@localhost
        sshGatewayPublicKey:
          type: string
          description: Base64 encoded SSH Gateway public key
          example: ssh-gateway-public-key
        rateLimit:
          description: Rate limit configuration
          allOf:
            - $ref: "#/components/schemas/RateLimitConfig"
      required:
        - version
        - oidc
        - linkedAccountsEnabled
        - announcements
        - proxyTemplateUrl
        - proxyToolboxUrl
        - defaultSnapshot
        - dashboardUrl
        - maxAutoArchiveInterval
        - maintananceMode
        - environment
    CreateApiKey:
      type: object
      properties:
        name:
          type: string
          description: The name of the API key
          example: My API Key
        permissions:
          type: array
          description: The list of organization resource permissions assigned to the API key
          items:
            type: string
            enum:
              - write:registries
              - delete:registries
              - write:snapshots
              - delete:snapshots
              - write:sandboxes
              - delete:sandboxes
              - read:volumes
              - write:volumes
              - delete:volumes
              - write:regions
              - delete:regions
              - read:runners
              - write:runners
              - delete:runners
              - read:audit_logs
        expiresAt:
          format: date-time
          type: string
          description: When the API key expires
          example: 2025-06-09T12:00:00.000Z
          nullable: true
      required:
        - name
        - permissions
    ApiKeyResponse:
      type: object
      properties:
        name:
          type: string
          description: The name of the API key
          example: My API Key
        value:
          type: string
          description: The API key value
          example: bb_sk_1234567890abcdef
        createdAt:
          format: date-time
          type: string
          description: When the API key was created
          example: 2024-03-14T12:00:00.000Z
        permissions:
          type: array
          description: The list of organization resource permissions assigned to the API key
          items:
            type: string
            enum:
              - write:registries
              - delete:registries
              - write:snapshots
              - delete:snapshots
              - write:sandboxes
              - delete:sandboxes
              - read:volumes
              - write:volumes
              - delete:volumes
              - write:regions
              - delete:regions
              - read:runners
              - write:runners
              - delete:runners
              - read:audit_logs
        expiresAt:
          format: date-time
          type: string
          description: When the API key expires
          example: 2025-06-09T12:00:00.000Z
          nullable: true
      required:
        - name
        - value
        - createdAt
        - permissions
        - expiresAt
    ApiKeyList:
      type: object
      properties:
        name:
          type: string
          description: The name of the API key
          example: My API Key
        value:
          type: string
          description: The masked API key value
          example: bb_********************def
        createdAt:
          format: date-time
          type: string
          description: When the API key was created
          example: 2024-03-14T12:00:00.000Z
        permissions:
          type: array
          description: The list of organization resource permissions assigned to the API key
          items:
            type: string
            enum:
              - write:registries
              - delete:registries
              - write:snapshots
              - delete:snapshots
              - write:sandboxes
              - delete:sandboxes
              - read:volumes
              - write:volumes
              - delete:volumes
              - write:regions
              - delete:regions
              - read:runners
              - write:runners
              - delete:runners
              - read:audit_logs
        lastUsedAt:
          format: date-time
          type: string
          description: When the API key was last used
          example: 2024-03-14T12:00:00.000Z
          nullable: true
        expiresAt:
          format: date-time
          type: string
          description: When the API key expires
          example: 2024-03-14T12:00:00.000Z
          nullable: true
        userId:
          type: string
          description: The user ID of the user who created the API key
          example: "123"
      required:
        - name
        - value
        - createdAt
        - permissions
        - lastUsedAt
        - expiresAt
        - userId
    OrganizationRole:
      type: object
      properties:
        id:
          type: string
          description: Role ID
        name:
          type: string
          description: Role name
        description:
          type: string
          description: Role description
        permissions:
          type: array
          description: Roles assigned to the user
          items:
            type: string
            enum:
              - write:registries
              - delete:registries
              - write:snapshots
              - delete:snapshots
              - write:sandboxes
              - delete:sandboxes
              - read:volumes
              - write:volumes
              - delete:volumes
              - write:regions
              - delete:regions
              - read:runners
              - write:runners
              - delete:runners
              - read:audit_logs
        isGlobal:
          type: boolean
          description: Global role flag
        createdAt:
          format: date-time
          type: string
          description: Creation timestamp
        updatedAt:
          format: date-time
          type: string
          description: Last update timestamp
      required:
        - id
        - name
        - description
        - permissions
        - isGlobal
        - createdAt
        - updatedAt
    OrganizationInvitation:
      type: object
      properties:
        id:
          type: string
          description: Invitation ID
        email:
          type: string
          description: Email address of the invitee
        invitedBy:
          type: string
          description: Email address of the inviter
        organizationId:
          type: string
          description: Organization ID
        organizationName:
          type: string
          description: Organization name
        expiresAt:
          format: date-time
          type: string
          description: Expiration date of the invitation
        status:
          type: string
          description: Invitation status
          enum:
            - pending
            - accepted
            - declined
            - cancelled
        role:
          type: string
          description: Member role
          enum:
            - owner
            - member
        assignedRoles:
          description: Assigned roles
          type: array
          items:
            $ref: "#/components/schemas/OrganizationRole"
        createdAt:
          format: date-time
          type: string
          description: Creation timestamp
        updatedAt:
          format: date-time
          type: string
          description: Last update timestamp
      required:
        - id
        - email
        - invitedBy
        - organizationId
        - organizationName
        - expiresAt
        - status
        - role
        - assignedRoles
        - createdAt
        - updatedAt
    CreateOrganization:
      type: object
      properties:
        name:
          type: string
          description: The name of organization
          example: My Organization
        defaultRegionId:
          type: string
          description: The ID of the default region for the organization
          example: us
      required:
        - name
        - defaultRegionId
    Organization:
      type: object
      properties:
        id:
          type: string
          description: Organization ID
        name:
          type: string
          description: Organization name
        createdBy:
          type: string
          description: User ID of the organization creator
        personal:
          type: boolean
          description: Personal organization flag
        createdAt:
          format: date-time
          type: string
          description: Creation timestamp
        updatedAt:
          format: date-time
          type: string
          description: Last update timestamp
        suspended:
          type: boolean
          description: Suspended flag
        suspendedAt:
          format: date-time
          type: string
          description: Suspended at
        suspensionReason:
          type: string
          description: Suspended reason
        suspendedUntil:
          format: date-time
          type: string
          description: Suspended until
        suspensionCleanupGracePeriodHours:
          type: number
          description: Suspension cleanup grace period hours
        maxCpuPerSandbox:
          type: number
          description: Max CPU per sandbox
        maxMemoryPerSandbox:
          type: number
          description: Max memory per sandbox
        maxDiskPerSandbox:
          type: number
          description: Max disk per sandbox
        sandboxLimitedNetworkEgress:
          type: boolean
          description: Sandbox default network block all
        defaultRegionId:
          type: string
          description: Default region ID
        authenticatedRateLimit:
          type: number
          description: Authenticated rate limit per minute
          nullable: true
        sandboxCreateRateLimit:
          type: number
          description: Sandbox create rate limit per minute
          nullable: true
        sandboxLifecycleRateLimit:
          type: number
          description: Sandbox lifecycle rate limit per minute
          nullable: true
        experimentalConfig:
          type: object
          description: Experimental configuration
        authenticatedRateLimitTtlSeconds:
          type: number
          description: Authenticated rate limit TTL in seconds
          nullable: true
        sandboxCreateRateLimitTtlSeconds:
          type: number
          description: Sandbox create rate limit TTL in seconds
          nullable: true
